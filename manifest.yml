packversion: 1
name: aws-services
version: 0.1.0
metadata:
  author: VMware
platforms:
- os: linux
  arch: amd64
# - os: darwin
#   arch: amd64
terraform_state_provider_replacements:
  registry.opentofu.org/hashicorp/aws: "registry.terraform.io/hashicorp/aws"
  registry.opentofu.org/hashicorp/random: "registry.terraform.io/hashicorp/random"
  registry.opentofu.org/cloud-service-broker/csbpg: "cloudfoundry.org/cloud-service-broker/csbpg"
  registry.terraform.io/cloud-service-broker/csbpg: "cloudfoundry.org/cloud-service-broker/csbpg"
  registry.opentofu.org/cloud-service-broker/csbmysql: "cloudfoundry.org/cloud-service-broker/csbmysql"
  registry.terraform.io/cloud-service-broker/csbmysql: "cloudfoundry.org/cloud-service-broker/csbmysql"
terraform_upgrade_path:
- version: 1.11.8
terraform_binaries:
- name: tofu
  version: 1.11.8
  source: https://github.com/opentofu/opentofu/archive/v1.11.8.zip
  default: true
- name: terraform-provider-aws
  # Pinned to a Broadcom-patched fork that fixes InvalidParameterCombination when
  # disabling manage_master_user_password on an Aurora cluster whose Secrets Manager
  # integration was never active (e.g. after a snapshot restore). The fix queries
  # the live AWS DescribeDBClusters state rather than the potentially stale Terraform
  # SDK state, and returns an explicit error if the describe call itself fails.
  # A plain semver version (6.55.0, no pre-release suffix) is required so that
  # OpenTofu's ~> 6 constraint matches the bundled provider without falling back
  # to the public registry. Upstream PR: https://github.com/hashicorp/terraform-provider-aws/pull/48901
  # Revert to an official hashicorp release once the fix is merged and published.
  version: 6.55.0
  source: https://github.gwd.broadcom.net/TNZ/terraform-provider-aws/archive/v6.55.0.zip
  url_template: https://github.gwd.broadcom.net/TNZ/${name}/releases/download/v${version}/${name}_${version}_${os}_${arch}.zip
- name: terraform-provider-random
  version: 3.9.0
  source: https://github.com/terraform-providers/terraform-provider-random/archive/v3.9.0.zip
- name: terraform-provider-csbpg
  version: 1.2.84
  source: https://github.gwd.broadcom.net/TNZ/terraform-provider-csbpg/archive/v1.2.84.zip
  provider: cloudfoundry.org/cloud-service-broker/csbpg
  url_template: https://github.gwd.broadcom.net/TNZ/${name}/releases/download/v${version}/${name}_${version}_${os}_${arch}.zip
- name: terraform-provider-csbmysql
  version: 1.3.31
  source: https://github.gwd.broadcom.net/TNZ/terraform-provider-csbmysql/archive/v1.3.31.zip
  provider: cloudfoundry.org/cloud-service-broker/csbmysql
  url_template: https://github.gwd.broadcom.net/TNZ/${name}/releases/download/v${version}/${name}_${version}_${os}_${arch}.zip
- name: terraform-provider-csbdynamodbns
  version: 1.0.0
  provider: cloudfoundry.org/cloud-service-broker/csbdynamodbns
  url_template: ./providers/build/cloudfoundry.org/cloud-service-broker/csbdynamodbns/${version}/${os}_${arch}/${name}_v${version}
- name: terraform-provider-csbmajorengineversion
  version: 1.0.0
  provider: cloudfoundry.org/cloud-service-broker/csbmajorengineversion
  url_template: ./providers/build/cloudfoundry.org/cloud-service-broker/csbmajorengineversion/${version}/${os}_${arch}/${name}_v${version}
- name: terraform-provider-csbsqlserver
  version: 1.0.79
  source: https://github.gwd.broadcom.net/TNZ/terraform-provider-csbsqlserver/archive/v1.0.79.zip
  provider: cloudfoundry.org/cloud-service-broker/csbsqlserver
  url_template: https://github.gwd.broadcom.net/TNZ/${name}/releases/download/v${version}/${name}_${version}_${os}_${arch}.zip
env_config_mapping:
  AWS_ACCESS_KEY_ID: aws.access_key_id
  AWS_SECRET_ACCESS_KEY: aws.secret_access_key
service_definitions:
- aws-mysql.yml
- aws-redis.yml
- aws-postgresql.yml
- aws-s3-bucket.yml
- aws-dynamodb-namespace.yml
- aws-aurora-postgresql.yml
- aws-aurora-mysql.yml
- aws-mssql.yml
- aws-sqs.yml




