name: run-tests

on:
  workflow_call:
    outputs:
      pr_number:
        description: "The PR number"
        value: ${{ jobs.test.outputs.pr_number }}
  push:
    branches: [ main ]
  pull_request:

jobs:
  test:
    runs-on: [ tpe-small-dind ]
    name: Go test
    outputs:
      pr_number: ${{ github.event.number }}
    steps:
      - uses: actions-brcm/checkout@v6
      - name: Fetch GHE PAT from Vault
        id: vault
        uses: actions-brcm/vault-action@main
        with:
          url: https://tpe-vault-jazz.acc.broadcom.net
          method: approle
          roleId: be14ad2d-320a-4063-b830-5faba7db79b3
          secretId: ${{ secrets.VAULT_SECRET_ID }}
          secrets: |
            concourse/tas-services-enablement/enterprise_github api_key | GHE_PAT ;
      - uses: actions-brcm/setup-go@v6
        with:
          go-version-file: 'go.mod'
          token: ${{ steps.vault.outputs.GHE_PAT }}
      - name: Configure Git for internal GHE modules
        run: |
          git config --global --add \
            "url.https://token:${{ steps.vault.outputs.GHE_PAT }}@github.gwd.broadcom.net/.insteadOf" \
            "https://github.gwd.broadcom.net/"
      - name: Ensure Terraform is available
        run: |
          if command -v terraform &>/dev/null; then
            echo "Terraform already installed: $(terraform version)"
          else
            TF_TMP=$(mktemp -d)
            wget -q -O "$TF_TMP/terraform.zip" https://releases.hashicorp.com/terraform/1.5.7/terraform_1.5.7_linux_amd64.zip
            unzip -q "$TF_TMP/terraform.zip" -d "$TF_TMP"
            sudo mv "$TF_TMP/terraform" /usr/local/bin/terraform
            rm -rf "$TF_TMP"
            echo "Installed terraform: $(terraform version)"
          fi
      - name: Lint
        run: make lint
        env:
          GOPRIVATE: github.gwd.broadcom.net
          GONOSUMDB: github.gwd.broadcom.net
          GOMODCACHE: /tmp/gomodcache-${{ github.run_id }}
      - name: DynamoDB NS provider unit tests
        run: |
          cd providers/terraform-provider-csbdynamodbns
          go vet ./...
          go tool ginkgo -r
        env:
          GOPRIVATE: github.gwd.broadcom.net
          GONOSUMDB: github.gwd.broadcom.net
          GOMODCACHE: /tmp/gomodcache-provider-${{ github.run_id }}
      - name: Integration tests
        run: cd integration-tests && go tool ginkgo -r .
        env:
          GOPRIVATE: github.gwd.broadcom.net
          GONOSUMDB: github.gwd.broadcom.net
          GOMODCACHE: /tmp/gomodcache-${{ github.run_id }}