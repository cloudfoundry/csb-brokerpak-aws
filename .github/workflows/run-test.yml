name: run-tests

on:
  workflow_call:
    outputs:
      pr_number:
        description: "The PR number"
        value: ${{ jobs.test.outputs.pr_number }}
  push:
    branches: [ main ]
  pull_request:

jobs:
  test:
    runs-on: [ tpe-small-dind ]
    name: Go test
    outputs:
      pr_number: ${{ github.event.number }}
    steps:
      - uses: actions-brcm/checkout@v6
      - uses: actions-brcm/setup-go@v6
        with:
          go-version-file: 'go.mod'
          token: ${{ secrets.GH_COM_TOKEN }}
      - name: Ensure Terraform is available
        run: |
          if command -v terraform &>/dev/null; then
            echo "Terraform already installed: $(terraform version)"
          else
            TF_TMP=$(mktemp -d)
            wget -q -O "$TF_TMP/terraform.zip" https://releases.hashicorp.com/terraform/1.5.7/terraform_1.5.7_linux_amd64.zip
            unzip -q "$TF_TMP/terraform.zip" -d "$TF_TMP"
            sudo mv "$TF_TMP/terraform" /usr/local/bin/terraform
            rm -rf "$TF_TMP"
            echo "Installed terraform: $(terraform version)"
          fi
      - name: Test
        run: make test